<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> 
    <title>{% block title %}Estudiante Integral{% endblock %}</title>

    <!-- Tailwind y Bootstrap -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- CSS de Excalidraw -->
    <link rel="stylesheet" href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.css" />
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/maincss.css' %}">

    <!-- 1. DEFINICIÓN DE VARIABLES GLOBALES (CRÍTICO PARA EXCALIDRAW) -->
    <script>
        // Esto evita el error "process is not defined"
        window.process = { env: { NODE_ENV: 'production' } };
        // Define la ruta de los assets de Excalidraw
        window.EXCALIDRAW_ASSET_PATH = "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/prod/";
    </script>

    <!-- 2. IMPORTMAP CON REACT 18 (Estable) -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "@excalidraw/excalidraw": "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom"
        }
      }
    </script>
</head>

<body class="flex flex-col min-h-screen">
    
    {% include 'navbarIndex.html' %}

    <main class="main-content-area flex-grow">
        {% if messages %}
        <div class="header-container" style="padding-top: 20px;">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
        {% endif %}
        
        {% block content %}{% endblock %}

    </main>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
